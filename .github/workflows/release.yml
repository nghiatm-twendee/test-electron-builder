name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      distribution-channel: latest
    permissions:
      contents: write
      id-token: write
      attestations: write
